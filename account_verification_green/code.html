<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#10b981",
                        "background-light": "#f8fafc",
                        "background-dark": "#0f172a",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<title>Verify Account | Health Recruitment UK</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex min-h-screen w-full flex-col items-center justify-center p-4">
<!-- Header / Logo Area -->
<div class="mb-8 flex flex-col items-center">
<div class="flex h-16 w-16 items-center justify-center rounded-full bg-primary/10 text-primary mb-4">
<span class="material-symbols-outlined text-4xl">medical_services</span>
</div>
<h1 class="text-xl font-bold tracking-tight text-slate-900 dark:text-slate-100">Health Recruitment UK</h1>
</div>
<!-- Main Card -->
<div class="w-full max-w-md bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800 p-8">
<div class="flex items-center mb-6">
<button class="text-slate-500 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-200 transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
</div>
<div class="text-center mb-8">
<h2 class="text-2xl font-bold leading-tight mb-2">Verify Your Account</h2>
<p class="text-slate-600 dark:text-slate-400 text-sm">We sent a 6-digit verification code to your registered email address. Please check your inbox and spam folder.</p>
</div>
<div class="mb-8">
<label class="block text-center text-sm font-semibold text-slate-700 dark:text-slate-300 mb-4 uppercase tracking-wider">
                    Enter Verification Code
                </label>
<div class="flex justify-between gap-2 sm:gap-4">
<input class="w-12 h-14 text-center text-2xl font-bold border-b-2 border-slate-200 dark:border-slate-700 bg-transparent focus:border-primary focus:ring-0 transition-all outline-none" maxlength="1" type="text"/>
<input class="w-12 h-14 text-center text-2xl font-bold border-b-2 border-slate-200 dark:border-slate-700 bg-transparent focus:border-primary focus:ring-0 transition-all outline-none" maxlength="1" type="text"/>
<input class="w-12 h-14 text-center text-2xl font-bold border-b-2 border-slate-200 dark:border-slate-700 bg-transparent focus:border-primary focus:ring-0 transition-all outline-none" maxlength="1" type="text"/>
<input class="w-12 h-14 text-center text-2xl font-bold border-b-2 border-slate-200 dark:border-slate-700 bg-transparent focus:border-primary focus:ring-0 transition-all outline-none" maxlength="1" type="text"/>
<input class="w-12 h-14 text-center text-2xl font-bold border-b-2 border-slate-200 dark:border-slate-700 bg-transparent focus:border-primary focus:ring-0 transition-all outline-none" maxlength="1" type="text"/>
<input class="w-12 h-14 text-center text-2xl font-bold border-b-2 border-slate-200 dark:border-slate-700 bg-transparent focus:border-primary focus:ring-0 transition-all outline-none" maxlength="1" type="text"/>
</div>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 px-6 rounded-full transition-all shadow-lg shadow-primary/20 flex items-center justify-center gap-2">
<span>Verify Account</span>
<span class="material-symbols-outlined text-xl">verified_user</span>
</button>
<div class="mt-8 text-center">
<p class="text-sm text-slate-500 dark:text-slate-400">
                    Didn't receive the code? 
                    <a class="text-primary font-semibold hover:underline" href="#">Resend Code</a>
</p>
</div>
</div>
<!-- Trust Badges -->
<div class="mt-8 flex items-center gap-6 text-slate-400 dark:text-slate-500">
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-lg">lock</span>
<span class="text-xs font-medium uppercase tracking-tighter">Secure SSL</span>
</div>
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-lg">shield_with_heart</span>
<span class="text-xs font-medium uppercase tracking-tighter">NHS Partner</span>
</div>
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-lg">gpp_good</span>
<span class="text-xs font-medium uppercase tracking-tighter">Data Protected</span>
</div>
</div>
</div>
<!-- Decorative Elements -->
<div class="fixed top-0 right-0 -z-10 opacity-10 dark:opacity-5">
<svg fill="none" height="400" viewbox="0 0 400 400" width="400" xmlns="http://www.w3.org/2000/svg">
<circle cx="300" cy="100" fill="url(#paint0_linear)" r="200"></circle>
<defs>
<lineargradient gradientunits="userSpaceOnUse" id="paint0_linear" x1="100" x2="500" y1="100" y2="100">
<stop stop-color="#10b981"></stop>
<stop offset="1" stop-color="#10b981" stop-opacity="0"></stop>
</lineargradient>
</defs>
</svg>
</div>
</body></html>
