<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Health Recruitment UK - Create Your Account</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#10b77f",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-x-hidden">
<header class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between sticky top-0 z-10">
<button class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-center hover:bg-primary/10 rounded-full transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Health Recruitment UK</h2>
</header>
<main class="flex-1 flex flex-col items-center justify-center px-4 py-8">
<div class="w-full max-w-[480px]">
<div class="mb-8 text-center">
<h1 class="text-slate-900 dark:text-slate-100 tracking-tight text-[32px] font-bold leading-tight pb-3">Create Your Account</h1>
<p class="text-slate-600 dark:text-slate-400 text-base">Join the UK's leading healthcare professional network.</p>
</div>
<form class="space-y-4">
<div class="flex flex-col w-full">
<label class="flex flex-col w-full">
<p class="text-slate-900 dark:text-slate-100 text-sm font-medium leading-normal pb-2">Full Name</p>
<input class="form-input flex w-full rounded-lg text-slate-900 dark:text-slate-100 border border-primary/20 bg-white dark:bg-background-dark focus:border-primary focus:ring-1 focus:ring-primary h-14 placeholder:text-slate-400 p-[15px] text-base" placeholder="Enter your full name" type="text"/>
</label>
</div>
<div class="flex flex-col w-full">
<label class="flex flex-col w-full">
<p class="text-slate-900 dark:text-slate-100 text-sm font-medium leading-normal pb-2">Email Address</p>
<input class="form-input flex w-full rounded-lg text-slate-900 dark:text-slate-100 border border-primary/20 bg-white dark:bg-background-dark focus:border-primary focus:ring-1 focus:ring-primary h-14 placeholder:text-slate-400 p-[15px] text-base" placeholder="email@example.com" type="email"/>
</label>
</div>
<div class="flex flex-col w-full">
<label class="flex flex-col w-full">
<p class="text-slate-900 dark:text-slate-100 text-sm font-medium leading-normal pb-2">Phone Number</p>
<input class="form-input flex w-full rounded-lg text-slate-900 dark:text-slate-100 border border-primary/20 bg-white dark:bg-background-dark focus:border-primary focus:ring-1 focus:ring-primary h-14 placeholder:text-slate-400 p-[15px] text-base" placeholder="+44 0000 000000" type="tel"/>
</label>
</div>
<div class="flex flex-col w-full">
<label class="flex flex-col w-full">
<p class="text-slate-900 dark:text-slate-100 text-sm font-medium leading-normal pb-2">Country of Residence</p>
<select class="form-select flex w-full rounded-lg text-slate-900 dark:text-slate-100 border border-primary/20 bg-white dark:bg-background-dark focus:border-primary focus:ring-1 focus:ring-primary h-14 p-[15px] text-base">
<option value="">Select country</option>
<option value="UK">United Kingdom</option>
<option value="IE">Ireland</option>
<option value="IN">India</option>
<option value="PH">Philippines</option>
<option value="AU">Australia</option>
<option value="CA">Canada</option>
</select>
</label>
</div>
<div class="flex flex-col w-full">
<label class="flex flex-col w-full">
<p class="text-slate-900 dark:text-slate-100 text-sm font-medium leading-normal pb-2">Password</p>
<input class="form-input flex w-full rounded-lg text-slate-900 dark:text-slate-100 border border-primary/20 bg-white dark:bg-background-dark focus:border-primary focus:ring-1 focus:ring-primary h-14 placeholder:text-slate-400 p-[15px] text-base" placeholder="••••••••" type="password"/>
</label>
</div>
<div class="flex flex-col w-full">
<label class="flex flex-col w-full">
<p class="text-slate-900 dark:text-slate-100 text-sm font-medium leading-normal pb-2">Confirm Password</p>
<input class="form-input flex w-full rounded-lg text-slate-900 dark:text-slate-100 border border-primary/20 bg-white dark:bg-background-dark focus:border-primary focus:ring-1 focus:ring-primary h-14 placeholder:text-slate-400 p-[15px] text-base" placeholder="••••••••" type="password"/>
</label>
</div>
<div class="flex items-center gap-3 py-2">
<input class="size-5 rounded border-primary/30 text-primary focus:ring-primary bg-white dark:bg-background-dark" id="terms" type="checkbox"/>
<label class="text-sm text-slate-700 dark:text-slate-300" for="terms">
                            I agree to the <a class="text-primary hover:underline" href="#">Terms of Service</a> and <a class="text-primary hover:underline" href="#">Privacy Policy</a>
</label>
</div>
<div class="pt-4">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-primary/20 active:scale-[0.98]" type="submit">
                            Create Account
                        </button>
</div>
</form>
<div class="mt-8 text-center pb-12">
<p class="text-slate-600 dark:text-slate-400">
                        Already have an account? 
                        <a class="text-primary font-semibold hover:underline" href="#">Sign In</a>
</p>
</div>
</div>
</main>
<div class="h-8 bg-background-light dark:bg-background-dark"></div>
</div>
</body></html>
