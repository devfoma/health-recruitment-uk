<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Forgot Password - Health Recruitment UK</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#10b981", // Medical Green
                        "background-light": "#f8fafc",
                        "background-dark": "#0f172a",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center p-4">
<div class="w-full max-w-md bg-white dark:bg-slate-900 shadow-xl rounded-2xl overflow-hidden border border-emerald-100 dark:border-slate-800">
<!-- Header with Back Button -->
<div class="flex items-center px-6 py-4 border-b border-emerald-50 dark:border-slate-800">
<button aria-label="Go back" class="text-emerald-700 dark:text-emerald-400 hover:bg-emerald-50 dark:hover:bg-slate-800 p-2 rounded-full transition-colors flex items-center justify-center">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="ml-4 text-slate-900 dark:text-slate-100 text-lg font-semibold font-display">Back to Login</h1>
</div>
<div class="p-8">
<!-- Brand/Icon Section -->
<div class="flex flex-col items-center mb-8">
<div class="w-16 h-16 bg-primary/10 rounded-full flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-primary text-4xl">medical_services</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-3xl font-bold font-display text-center">Reset Password</h2>
<div class="mt-2 h-1 w-12 bg-primary rounded-full"></div>
</div>
<!-- Description -->
<p class="text-slate-600 dark:text-slate-400 text-base leading-relaxed text-center mb-8">
                Enter your email address and we'll send you a link to reset your password.
            </p>
<!-- Form -->
<form class="space-y-6">
<div class="space-y-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1" for="email">
                        Email Address
                    </label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">mail</span>
<input class="w-full pl-12 pr-4 py-4 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-full text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-slate-400" id="email" placeholder="e.g. doctor@healthrecruitment.uk" required="" type="email"/>
</div>
</div>
<button class="w-full bg-primary hover:bg-emerald-600 text-white font-bold py-4 px-6 rounded-full transition-all shadow-lg shadow-emerald-200 dark:shadow-none flex items-center justify-center gap-2 group" type="submit">
<span>Send Reset Link</span>
<span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform">send</span>
</button>
</form>
<!-- Footer Help -->
<div class="mt-10 text-center">
<p class="text-slate-500 dark:text-slate-500 text-sm">
                    Having trouble? <a class="text-primary font-semibold hover:underline" href="#">Contact Support</a>
</p>
</div>
</div>
<!-- Decorative Pattern -->
<div class="h-2 bg-gradient-to-r from-emerald-400 via-primary to-emerald-600 w-full"></div>
</div>
<!-- Background Decoration -->
<div class="fixed -top-24 -right-24 w-96 h-96 bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
<div class="fixed -bottom-24 -left-24 w-96 h-96 bg-emerald-500/5 rounded-full blur-3xl pointer-events-none"></div>
</body></html>
